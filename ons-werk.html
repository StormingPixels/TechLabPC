<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ons Werk | TechLabPC</title>
    <link rel="canonical" href="https://techlabpc.nl/ons-werk.html">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://primary.jwwb.nl/public/v/r/p/temp-ybtehqbsjxucsprizuzy/techlabpc-logo-high.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">TechLabPC</a>
            <button class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="diensten.html">Diensten</a></li>
                <li><a href="ons-werk.html" class="active">Ons Werk</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="over-mij.html">Over Mij</a></li>
                <li><a href="admin-login.html">Admin Login</a></li>
            </ul>
        </div>
    </nav>

    <section class="page-start">
        <div class="container" style="text-align: center;">
            <h2 class="section-title">Onze Projecten</h2>
            <p class="section-subtitle">Bekijk hier een selectie van de PC's die we hebben gebouwd en reparaties die we hebben uitgevoerd.</p>
        </div>
    </section>

    <!-- Projecten container voor de Strips -->
    <section id="projects-container" class="portfolio-strips">
        <p style="text-align: center; padding: 100px 0;">Projecten laden...</p>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 TechLabPC. Alle rechten voorbehouden.</p>
        </div>
    </footer>

    <script>
        const supabaseUrl = 'https://gynfsfqhzkwxpbxhkcdx.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5bmZzZnFoemt3eHBieGhrY2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjM4OTAsImV4cCI6MjA5NDQ5OTg5MH0.FNQZX1eFu5IrnSoBBS7nTrfV3Ov7eQ8uA4RyU7oAW_0';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchProjects() {
            const { data, error } = await supabaseClient
                .from('projects')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Fout bij laden:', error);
                return;
            }
            console.log('Alle projecten opgehaald:', data);

            const container = document.getElementById('projects-container');
            if (!data || data.length === 0) {
                container.innerHTML = '<p>Nog geen projecten om weer te geven.</p>';
                return;
            }

            container.innerHTML = data.map((project, index) => {
                // Zoek naar imageUrl of imageurl en filter lege waarden
                const rawImages = project.imageUrl || project.imageurl;
                const images = Array.isArray(rawImages) ? rawImages : [rawImages];
                const validImages = images.filter(url => url && typeof url === 'string');

                if (validImages.length === 0) {
                    console.warn(`Project "${project.title}" heeft geen geldige afbeeldingen.`, project);
                } else {
                    console.log(`Afbeeldingen voor "${project.title}":`, validImages);
                }

                const imageCount = Math.min(validImages.length, 4); 
                
                let imageHtml = '';
                if (validImages.length > 1) {
                    imageHtml = `
                        <div class="collage-grid count-${imageCount}">
                            ${validImages.slice(0, 4).map(url => `<img src="${url}" alt="Project foto" onerror="this.src='https://via.placeholder.com/500x500?text=Fout+Laden'">`).join('')}
                        </div>
                    `;
                } else if (validImages.length === 1) {
                    imageHtml = `<img src="${validImages[0]}" alt="${project.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/500x500?text=Fout+Laden'">`;
                } else {
                    imageHtml = `<div style="width:100%; height:300px; background:#eee; display:flex; align-items:center; justify-content:center; border-radius:5px;">Geen afbeelding beschikbaar</div>`;
                }

                return `
                <div class="jw-strip ${index % 2 !== 0 ? 'jw-strip--reverse' : ''} ${index % 2 !== 0 ? 'jw-strip--shaded' : ''}">
                    <div class="container jw-strip__inner">
                        <div class="jw-strip__image">
                            ${imageHtml}
                        </div>
                        <div class="jw-strip__content">
                            <div class="jw-content-box">
                                <span class="project-tag">Project Details</span>
                                <h2 class="jw-heading-100">${project.title}</h2>
                                <div class="jw-description">
                                    <p>${project.description}</p>
                                </div>
                                <a href="contact.html" class="btn btn-outline">Ook zoiets nodig?</a>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Mobile Menu Logic
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        fetchProjects();
    </script>
</body>
</html>
