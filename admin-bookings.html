<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingeplande Afspraken | TechLabPC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="admin-panel.html" class="logo">Afspraken</a>
            <ul class="nav-links">
                <li><a href="admin-panel.html">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <section class="page-start">
        <div class="container" style="max-width: 800px;">
            <h2 class="section-title" style="text-align: left;">Afspraken Bekijken</h2>
            
            <div class="calendar-header">
                <button class="btn btn-outline" style="margin:0; padding: 5px 15px;" onclick="changeDate(-1)"><i class="fas fa-chevron-left"></i></button>
                <h3 id="current-date-display" style="margin:0;">Laden...</h3>
                <button class="btn btn-outline" style="margin:0; padding: 5px 15px;" onclick="changeDate(1)"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div id="admin-slots-list" class="timeline">
                <p>Zoeken naar afspraken...</p>
            </div>
        </div>
    </section>

    <script>
        const supabaseUrl = 'https://gynfsfqhzkwxpbxhkcdx.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5bmZzZnFoemt3eHBieGhrY2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjM4OTAsImV4cCI6MjA5NDQ5OTg5MH0.FNQZX1eFu5IrnSoBBS7nTrfV3Ov7eQ8uA4RyU7oAW_0';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey, {
            auth: { persistSession: true, autoRefreshToken: true }
        });

        let currentDate = new Date();

        window.changeDate = (days) => {
            currentDate.setDate(currentDate.getDate() + days);
            renderView();
        };

        function renderView() {
            const display = document.getElementById('current-date-display');
            display.innerText = currentDate.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
            loadBookings();
        }

        async function loadBookings() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'admin-login.html'; return; }

            // Start en eind van de geselecteerde dag berekenen
            const startOfDay = new Date(currentDate);
            startOfDay.setHours(0,0,0,0);
            const endOfDay = new Date(currentDate);
            endOfDay.setHours(23,59,59,999);

            const { data, error } = await supabaseClient
                .from('schedule')
                .select('*')
                .eq('status', 'booked')
                .gte('start_time', startOfDay.toISOString())
                .lte('start_time', endOfDay.toISOString())
                .order('start_time', { ascending: true });
            
            const list = document.getElementById('admin-slots-list');
            if (!data || data.length === 0) { 
                list.innerHTML = '<p style="text-align:center; color:#999; padding: 40px 0;">Geen afspraken gepland voor deze dag.</p>'; 
                return; 
            }

            list.innerHTML = data.map(slot => {
                const time = new Date(slot.start_time).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
                return `
                    <div class="timeline-event" style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div style="position: absolute; left: -60px; top: 15px; font-weight: bold; color: var(--text-dim);">${time}</div>
                        <div>
                            <span style="font-size: 1.1rem; font-weight: bold; color: #333;">${slot.customer_name}</span><br>
                            <small style="color: var(--accent-color);">${slot.service_type}</small>
                            <p style="margin: 8px 0 0 0; font-size: 0.9rem;">${slot.message || 'Geen extra omschrijving'}</p>
                            <small style="display:block; margin-top:5px; color: #888;">${slot.customer_email}</small>
                        </div>
                        <button onclick="deleteSlot('${slot.id}')" style="color: #ccc; background: none; border: none; cursor: pointer; font-size: 1.1rem;" onmouseover="this.style.color='red'" onmouseout="this.style.color='#ccc'">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
            }).join('');
        }

        window.deleteSlot = async (id) => {
            if (confirm('Afspraak verwijderen uit lijst?')) {
                await supabaseClient.from('schedule').delete().eq('id', id); loadBookings();
            }
        };
        
        renderView();
    </script>
</body>
</html>
