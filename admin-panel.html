<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | TechLabPC</title>
    <link rel="canonical" href="https://techlabpc.nl/admin-panel.html">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://primary.jwwb.nl/public/v/r/p/temp-ybtehqbsjxucsprizuzy/techlabpc-logo-high.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">TechLabPC</a>
            <button class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="diensten.html">Diensten</a></li>
                <li><a href="ons-werk.html">Ons Werk</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="over-mij.html">Over Mij</a></li>
                <li><a href="admin-login.html" class="active">Admin Panel</a></li>
            </ul>
        </div>
    </nav>

    <section id="admin-panel" class="page-start" style="padding: 100px 0;">
        <div class="container" style="max-width: 800px; margin: 0 auto;">
            <h2 id="admin-greeting" class="section-title" style="font-size: 1.5rem; color: var(--text-dim); margin-bottom: 0.5rem; text-align: left;">Bezig met laden...</h2>
            
            <!-- Planning Sectie -->
            <div style="background: var(--section-alt); padding: 2rem; border-radius: 15px; margin-bottom: 3rem;">
                <h2 class="section-title" style="text-align: left; font-size: 1.8rem;">Agenda Beheren</h2>
                <p style="margin-bottom: 1rem;">Voeg momenten toe waarop je beschikbaar bent voor werk.</p>
                <form id="add-slot-form" class="contact-form" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="datetime-local" id="slot-time" required style="flex: 2;">
                    <button type="submit" class="btn" style="margin-top: 0;">Slot Toevoegen</button>
                </form>
                <div id="admin-slots-list" style="margin-top: 2rem;">
                    <!-- Hier komen je geplande slots -->
                </div>
            </div>

            <!-- Projecten Sectie -->
            <h2 class="section-title" style="text-align: left; margin-bottom: 2rem;">Project Toevoegen</h2>
            <form id="add-project-form" class="contact-form">
                <input type="text" id="project-title" placeholder="Project Titel" required>
                <textarea id="project-description" rows="4" placeholder="Project Beschrijving" required></textarea>
                <label style="font-size: 0.9rem; color: var(--text-dim);">Project foto's selecteren (meerdere mogelijk):</label>
                <input type="file" id="project-image-file" accept="image/*" multiple required>
                
                <div id="reorder-preview" class="admin-reorder-list"></div>

                <button type="submit" class="btn" id="add-project-btn">Project Toevoegen</button>
                <p id="project-status" style="margin-top: 15px; display: none;"></p>
            </form>
            <button id="logout-btn" class="btn btn-secondary" style="margin-top: 20px;">Uitloggen</button>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 TechLabPC. Alle rechten voorbehouden.</p>
        </div>
    </footer>

    <script>
        const supabaseUrl = 'https://gynfsfqhzkwxpbxhkcdx.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5bmZzZnFoemt3eHBieGhrY2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjM4OTAsImV4cCI6MjA5NDQ5OTg5MH0.FNQZX1eFu5IrnSoBBS7nTrfV3Ov7eQ8uA4RyU7oAW_0';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Check if user is logged in
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'admin-login.html';
                return;
            }
            loadAdminSlots();

            // Haal de display_name op uit de profiles tabel
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('display_name')
                .eq('id', session.user.id)
                .maybeSingle();

            const greetingElement = document.getElementById('admin-greeting');
            if (profile && profile.display_name) {
                greetingElement.innerText = `Welkom terug, ${profile.display_name}!`;
            } else {
                greetingElement.innerText = "Welkom terug, Admin!";
            }
        }
        checkAuth();

        // Planning functies voor Admin
        async function loadAdminSlots() {
            const { data, error } = await supabaseClient
                .from('schedule')
                .select('*')
                .order('start_time', { ascending: true });
            
            const list = document.getElementById('admin-slots-list');
            if (error || !data) return;

            list.innerHTML = '<h3>Je planning:</h3>' + data.map(slot => {
                const date = new Date(slot.start_time).toLocaleString('nl-NL', { dateStyle: 'long', timeStyle: 'short' });
                const isBooked = slot.status === 'booked';
                return `
                    <div style="padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: ${isBooked ? '#ffe6e6' : 'transparent'}">
                        <div>
                            <strong>${date}</strong> - 
                            <span style="color: ${isBooked ? 'red' : 'green'}">${isBooked ? 'GEBOEKT door ' + slot.customer_name : 'Beschikbaar'}</span>
                            ${isBooked ? `<br><small>${slot.service_type}: ${slot.message}</small>` : ''}
                        </div>
                        <button onclick="deleteSlot('${slot.id}')" style="background: none; border: none; color: red; cursor: pointer;">Verwijderen</button>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('add-slot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const startTime = document.getElementById('slot-time').value;
            const { error } = await supabaseClient.from('schedule').insert([{ start_time: startTime }]);
            if (error) alert(error.message);
            else {
                document.getElementById('add-slot-form').reset();
                loadAdminSlots();
            }
        });

        window.deleteSlot = async (id) => {
            if (confirm('Weet je zeker dat je dit slot wilt verwijderen?')) {
                await supabaseClient.from('schedule').delete().eq('id', id);
                loadAdminSlots();
            }
        };

        let selectedFiles = [];

        document.getElementById('project-image-file').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedFiles.push({ file, preview: event.target.result });
                    renderPreviews();
                };
                reader.readAsDataURL(file);
            });
        });

        function renderPreviews() {
            const container = document.getElementById('reorder-preview');
            container.innerHTML = selectedFiles.map((item, index) => `
                <div class="reorder-item">
                    <img src="${item.preview}" alt="Preview">
                    <div class="reorder-controls">
                        <button type="button" onclick="moveItem(${index}, -1)" ${index === 0 ? 'disabled' : ''}>↑</button>
                        <button type="button" onclick="moveItem(${index}, 1)" ${index === selectedFiles.length - 1 ? 'disabled' : ''}>↓</button>
                        <button type="button" onclick="removeItem(${index})" style="color: red;">✕</button>
                    </div>
                </div>
            `).join('');
        }

        window.moveItem = (index, direction) => {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= selectedFiles.length) return;
            [selectedFiles[index], selectedFiles[newIndex]] = [selectedFiles[newIndex], selectedFiles[index]];
            renderPreviews();
        };

        window.removeItem = (index) => {
            selectedFiles.splice(index, 1);
            renderPreviews();
        };

        document.getElementById('add-project-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (selectedFiles.length === 0) return alert("Selecteer minstens één foto.");

            const title = document.getElementById('project-title').value;
            const description = document.getElementById('project-description').value;
            const addProjectBtn = document.getElementById('add-project-btn');
            const projectStatus = document.getElementById('project-status');

            addProjectBtn.disabled = true;
            addProjectBtn.innerText = `Uploaden (0/${selectedFiles.length})...`;
            projectStatus.style.display = 'none';

            try {
                const uploadedUrls = [];

                for (let i = 0; i < selectedFiles.length; i++) {
                    addProjectBtn.innerText = `Uploaden (${i + 1}/${selectedFiles.length})...`;
                    const fileObj = selectedFiles[i].file;
                    const fileName = `${Date.now()}-${fileObj.name}`;
                    
                    const { data, error: uploadError } = await supabaseClient
                        .storage
                        .from('project-images')
                        .upload(fileName, fileObj);

                    if (uploadError) throw uploadError;

                    const { data: urlData } = supabaseClient.storage.from('project-images').getPublicUrl(fileName);
                    uploadedUrls.push(urlData.publicUrl);
                }

                // Sla de lijst met URL's op
                const { error: dbError } = await supabaseClient
                    .from('projects')
                    .insert([{ title, description, imageUrl: uploadedUrls }]);

                if (dbError) throw dbError;

                projectStatus.innerText = 'Project succesvol toegevoegd!';
                projectStatus.style.color = 'green';
                selectedFiles = [];
                document.getElementById('reorder-preview').innerHTML = '';
                document.getElementById('add-project-form').reset();
            } catch (err) {
                projectStatus.innerText = 'Fout: ' + err.message;
                projectStatus.style.color = 'red';
            }
            
            projectStatus.style.display = 'block';
            addProjectBtn.disabled = false;
            addProjectBtn.innerText = 'Project Toevoegen';
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            const { error } = await supabaseClient.auth.signOut();
            if (!error) {
                window.location.href = 'admin-login.html';
            } else {
                console.error('Fout bij uitloggen:', error);
            }
        });

        // Mobile Menu Logic
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
