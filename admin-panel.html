<!DOCTYPE html>

    <meta name="theme-color" content="#A8B090">
    <link rel="apple-touch-icon" href="https://primary.jwwb.nl/public/v/r/p/temp-ybtehqbsjxucsprizuzy/techlabpc-logo-high.png">
    <!-- Font Awesome voor Dashboard Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://primary.jwwb.nl/public/v/r/p/temp-ybtehqbsjxucsprizuzy/techlabpc-logo-high.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">TechLabPC</a>
            <button class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="diensten.html">Diensten</a></li>
                <li><a href="ons-werk.html">Ons Werk</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="over-mij.html">Over Mij</a></li>
                <li><a href="admin-login.html" class="active">Admin Panel</a></li>
            </ul>
        </div>
    </nav>

    <section id="admin-panel" class="page-start" style="padding: 100px 0;">
        <div class="container" style="max-width: 800px; margin: 0 auto;">
            <h2 id="admin-greeting" class="section-title" style="text-align: left;">Welkom, beheerder</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 2rem;">
                <a href="admin-agenda.html" class="btn" style="text-align: center; margin: 0; padding: 3rem 1rem;">
                    <i class="fa-solid fa-calendar-days" style="display: block; font-size: 2rem; margin-bottom: 10px;"></i>
                    Agenda Beheren
                </a>
                <a href="admin-projects.html" class="btn" style="text-align: center; margin: 0; padding: 3rem 1rem;">
                    <i class="fa-solid fa-images" style="display: block; font-size: 2rem; margin-bottom: 10px;"></i>
                    Projecten Toevoegen
                </a>
                <a href="admin-settings.html" class="btn" style="text-align: center; margin: 0; padding: 3rem 1rem;">
                    <i class="fa-solid fa-clock" style="display: block; font-size: 2rem; margin-bottom: 10px;"></i>
                    Openingstijden
                </a>
            </div>

            <button id="logout-btn" class="btn btn-secondary" style="margin-top: 20px;">Uitloggen</button>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 TechLabPC. Alle rechten voorbehouden.</p>
        </div>
    </footer>

    <script>
        // Register Service Worker voor PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }

        const supabaseUrl = 'https://gynfsfqhzkwxpbxhkcdx.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5bmZzZnFoemt3eHBieGhrY2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjM4OTAsImV4cCI6MjA5NDQ5OTg5MH0.FNQZX1eFu5IrnSoBBS7nTrfV3Ov7eQ8uA4RyU7oAW_0';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Check if user is logged in
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'admin-login.html';
                return;
            }
            // Haal de display_name op uit de profiles tabel
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('display_name')
                .eq('id', session.user.id)
                .maybeSingle();

            if (profile && profile.display_name) {
                document.getElementById('admin-greeting').innerText = `Welkom, ${profile.display_name}`;
            }
        }
        checkAuth();
        document.getElementById('logout-btn').addEventListener('click', async () => {
            const { error } = await supabaseClient.auth.signOut();
            if (!error) {
                window.location.href = 'admin-login.html';
            } else {
                console.error('Fout bij uitloggen:', error);
            }
        });

        // Mobile Menu Logic
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
